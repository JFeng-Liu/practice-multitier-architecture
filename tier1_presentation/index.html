<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multitier Bookstore - Final Polished Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .smooth-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Style for toast stacking */
        .custom-toast {
            transition: all 0.5s ease;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 antialiased p-8">

    <header class="max-w-6xl mx-auto flex justify-between items-end border-b-2 border-gray-900 pb-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold tracking-tight">Book Store</h1>
            <a href="https://github.com/JFeng-Liu/multitier-architecture-practice" 
               class="text-sm text-gray-500 hover:text-blue-600 smooth-transition" target="_blank">
                https://github.com/JFeng-Liu/multitier-architecture-practice
            </a>
        </div>
        <div class="text-sm font-medium cursor-pointer hover:opacity-70 smooth-transition">
            <span id="lang-en" class="font-bold border-b-2 border-black">EN</span> / <span id="lang-jp" class="text-gray-400">JP</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12">
        <div class="md:col-span-2 grid grid-cols-3 gap-6" id="product-list"></div>

        <div class="md:col-span-1 space-y-6">
            <div class="glass-panel p-6 rounded-2xl shadow-sm border border-gray-200 border-dashed">
                <h2 class="text-xl font-semibold mb-4" id="label-cart">Cart</h2>
                <ul id="cart-items" class="space-y-2 text-sm text-gray-600 min-h-[60px]"></ul>
            </div>

            <div class="glass-panel p-6 rounded-2xl shadow-lg border border-gray-100">
                <div class="mb-4 flex justify-between items-start">
                    <div>
                        <label id="label-region" class="block text-sm font-medium text-gray-500 mb-1">Region</label>
                        <div id="region-select-container"></div> 
                    </div>
                    <div class="text-right">
                        <label id="label-tax" class="block text-sm font-medium text-gray-500 mb-1">Tax Rate</label>
                        <span id="tax-display" class="font-medium text-sm text-gray-800">0.00%</span>
                    </div>
                </div>

                <div id="extra-inputs-container" class="mb-6"></div>

                <button id="btn-calculate" class="w-full bg-black text-white rounded-xl py-3 font-semibold shadow-md hover:scale-[1.02] active:scale-95 smooth-transition mb-6">
                    Calculate
                </button>

                <div class="space-y-3 text-sm" id="results-area">
                    <div class="flex justify-between text-gray-500">
                        <span id="label-total">Total Price</span>
                        <span class="font-medium text-gray-800" id="res-total">0.00</span>
                    </div>
                    <div id="res-total-after-row" class="hidden flex justify-between text-gray-500">
                        <span id="label-total-after">Total (After Discount)</span>
                        <span class="font-medium text-gray-800" id="res-total-after">0.00</span>
                    </div>
                    <div class="flex justify-between text-gray-500">
                        <span id="label-tax-amount">Tax</span>
                        <span class="font-medium text-gray-800" id="res-tax">0.00</span>
                    </div>
                    <div class="flex justify-between text-lg font-bold border-t pt-3 mt-1 text-gray-900">
                        <span id="label-final">Final Price</span>
                        <span id="res-final">0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 1. Data Definitions ---
        const BOOKS_DISPLAY = {
            1: { id: 1, name_en: "Red", name_jp: "赤", price_usd: 15.00, price_jpy: 2000, color: "bg-red-500" },
            2: { id: 2, name_en: "Green", name_jp: "緑", price_usd: 20.00, price_jpy: 3000, color: "bg-green-500" },
            3: { id: 3, name_en: "Blue", name_jp: "青", price_usd: 25.00, price_jpy: 4000, color: "bg-blue-500" }
        };

        const US_TAX_DISPLAY = {
            "NY": { name: "New York", rate: 0.1000 },
            "CA": { name: "California", rate: 0.0950 },
            "TX": { name: "Texas", rate: 0.0800 }
        };

        const i18n = {
            EN: {
                cart: "Cart", state: "State", country: "Country", taxRate: "Tax Rate",
                calc: "Calculate", total: "Total Price", totalAfter: "Total (After Discount)", tax: "Tax", final: "Final Price",
                empty: "Cart is empty", discount: "Discount %", japan: "Japan", currency: "$",
                "E001": "The cart is empty",
                "E002": "Invalid discount rate",
                "E003": "Invalid region selected",
                "W001": "Discount rate is unusually high. Please double-check."
            },
            JP: {
                cart: "カート", state: "州", country: "国", taxRate: "税率",
                calc: "計算する", 
                total: "合計金額（割引前）", 
                totalAfter: "合計金額（割引後）", 
                tax: "税金", 
                final: "最終価格",
                empty: "カートは空です", discount: "割引率 %", japan: "日本", currency: "¥",
                "E001": "カートが空です",
                "E002": "無効な割引率です",
                "E003": "無効なリージョンが選択されました",
                "W001": "割引率が高すぎます。再度ご確認ください。"
            }
        };

        // --- 2. Application State ---
        let state = {
            lang: 'EN',      
            region: 'US',    
            cart: { 1: 0, 2: 0, 3: 0 },
            selectedState: "NY",
            discount: 0
        };

        // --- 3. UI Helpers ---

        // Reset all numerical results to zero strings
        function resetResults() {
            const zero = state.lang === 'EN' ? '$0.00' : '¥0';
            document.getElementById('res-total').innerText = zero;
            document.getElementById('res-tax').innerText = zero;
            document.getElementById('res-final').innerText = zero;
            if (document.getElementById('res-total-after')) {
                document.getElementById('res-total-after').innerText = zero;
            }
        }

        // Show floating toast (error/warning)
        function showToast(msg, type = 'warning') {
            const toast = document.createElement('div');
            const existingToasts = document.querySelectorAll('.custom-toast').length;
            const baseClass = "fixed left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-medium z-[100] flex items-center gap-2 custom-toast smooth-transition";
            const typeClass = type === 'error' ? "bg-red-600 text-white" : "bg-yellow-400 text-gray-900";
            
            toast.className = `${baseClass} ${typeClass}`;
            toast.style.top = `${30 + (existingToasts * 60)}px`;
            toast.innerHTML = `<span>${type === 'error' ? '✕' : '⚠'}</span> <span>${msg}</span>`;
            
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        }

        // --- 4. Main Rendering Logic ---

        function refreshUI() {
            const t = i18n[state.lang];
            
            // Update Labels
            document.getElementById('label-cart').innerText = t.cart;
            document.getElementById('label-region').innerText = state.region === 'US' ? t.state : t.country;
            document.getElementById('label-tax').innerText = t.taxRate;
            document.getElementById('btn-calculate').innerText = t.calc;
            document.getElementById('label-total').innerText = t.total;
            document.getElementById('label-total-after').innerText = t.totalAfter;
            document.getElementById('label-tax-amount').innerText = t.tax;
            document.getElementById('label-final').innerText = t.final;

            // Language Toggles
            document.getElementById('lang-en').className = state.lang === 'EN' ? 'font-bold border-b-2 border-black' : 'text-gray-400';
            document.getElementById('lang-jp').className = state.lang === 'JP' ? 'font-bold border-b-2 border-black' : 'text-gray-400';

            renderBooks();
            renderRegionForm();
            renderCartSummary();
        }

        function renderBooks() {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            Object.values(BOOKS_DISPLAY).forEach(book => {
                const name = state.lang === 'EN' ? book.name_en : book.name_jp;
                const price = state.lang === 'EN' ? `$${book.price_usd}` : `¥${book.price_jpy}`;
                const div = document.createElement('div');
                div.className = "flex flex-col items-center";
                div.innerHTML = `
                    <div class="${book.color} w-32 h-40 rounded-2xl shadow-sm flex items-center justify-center text-white font-bold text-xl mb-3 transition transform hover:-translate-y-1">
                        ${name}
                    </div>
                    <p class="text-xs text-gray-500 font-medium mb-2">${price}</p>
                    <div class="flex items-center border border-gray-200 rounded-lg bg-white overflow-hidden shadow-sm">
                        <button onclick="updateQty(${book.id}, -1)" class="px-3 py-1 hover:bg-gray-100 font-bold text-gray-400">-</button>
                        <span class="px-4 py-1 text-sm w-12 text-center font-bold">${state.cart[book.id]}</span>
                        <button onclick="updateQty(${book.id}, 1)" class="px-3 py-1 hover:bg-gray-100 font-bold text-gray-400">+</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function renderRegionForm() {
            const container = document.getElementById('region-select-container');
            const taxDisplay = document.getElementById('tax-display');
            const extraContainer = document.getElementById('extra-inputs-container');
            const t = i18n[state.lang];

            if (state.region === 'US') {
                // US Specific: Dropdown
                let options = Object.keys(US_TAX_DISPLAY).map(code => 
                    `<option value="${code}" ${state.selectedState === code ? 'selected' : ''}>${US_TAX_DISPLAY[code].name}</option>`
                ).join('');
                container.innerHTML = `<select onchange="state.selectedState=this.value; resetResults(); refreshUI()" class="border border-gray-300 rounded-md py-1.5 px-3 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-black transition">${options}</select>`;
                taxDisplay.innerText = (US_TAX_DISPLAY[state.selectedState].rate * 100).toFixed(2) + '%';
                extraContainer.innerHTML = ''; 
                document.getElementById('res-total-after-row').classList.add('hidden');
            } else {
                // JP Specific: Country Name + Discount Input on next line
                container.innerHTML = `<span class="text-sm font-semibold text-gray-800 mt-2 inline-block">${t.japan}</span>`;
                taxDisplay.innerText = '10%';
                // Ensure JP total row is ALWAYS visible in JP mode to prevent jumping
                document.getElementById('res-total-after-row').classList.remove('hidden');
                
                extraContainer.innerHTML = `
                    <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm mt-2 transition focus-within:ring-2 focus-within:ring-black">
                        <label class="block text-xs font-semibold text-gray-500 mb-1">${t.discount}</label>
                        <input type="number" id="discount-input" value="${state.discount}" onchange="state.discount=this.value; resetResults();" class="w-full border-b-2 border-gray-200 focus:border-black outline-none py-1 text-sm bg-transparent transition">
                    </div>
                `;
            }
        }

        function renderCartSummary() {
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let hasItems = false;
            Object.keys(state.cart).forEach(id => {
                if (state.cart[id] > 0) {
                    hasItems = true;
                    const name = state.lang === 'EN' ? BOOKS_DISPLAY[id].name_en : BOOKS_DISPLAY[id].name_jp;
                    list.innerHTML += `<li class="flex justify-between border-b border-gray-100 pb-1 last:border-0"><span class="font-medium">${name}</span> <span class="text-gray-400">× ${state.cart[id]}</span></li>`;
                }
            });
            if (!hasItems) list.innerHTML = `<li class="italic text-gray-400 text-xs">${i18n[state.lang].empty}</li>`;
        }

        // --- 5. Event Handlers ---

        window.updateQty = (id, change) => {
            state.cart[id] = Math.max(0, state.cart[id] + change);
            resetResults(); // Reset amounts when qty changes
            refreshUI();
        };

        // Language toggle with full reset
        document.getElementById('lang-en').onclick = () => { 
            state.lang = 'EN'; state.region = 'US'; 
            state.cart = {1:0,2:0,3:0}; state.discount = 0; 
            resetResults(); refreshUI(); 
        };
        document.getElementById('lang-jp').onclick = () => { 
            state.lang = 'JP'; state.region = 'JP'; 
            state.cart = {1:0,2:0,3:0}; state.discount = 0; 
            resetResults(); refreshUI(); 
        };

        // API Call
        document.getElementById('btn-calculate').onclick = async () => {
            const t = i18n[state.lang];
            const payload = {
                region: state.region,
                items: Object.keys(state.cart).filter(id => state.cart[id] > 0).map(id => ({
                    book_id: parseInt(id),
                    quantity: state.cart[id]
                }))
            };
            if (state.region === 'US') payload.state_id = state.selectedState;
            if (state.region === 'JP') payload.discount_percent = parseInt(state.discount || 0);

            try {
                const response = await fetch('http://127.0.0.1:8000/api/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (data.status === 'success') {
                    const symbol = t.currency;
                    document.getElementById('res-total').innerText = symbol + data.total_price_wot;
                    document.getElementById('res-tax').innerText = symbol + data.tax_amount;
                    document.getElementById('res-final').innerText = symbol + data.total_price_wt;
                    
                    // Specific handling for Japan multi-tier results
                    if (state.region === 'JP' && data.discounted_total_price_wot) {
                        document.getElementById('res-total-after').innerText = symbol + data.discounted_total_price_wot;
                    }

                    // Process multiple warnings
                    if (data.warnings && data.warnings.length > 0) {
                        data.warnings.forEach(w => {
                            showToast(t[w.warning_code] || w.message, 'warning');
                        });
                    }
                } else {
                    // Process multiple errors
                    if (data.errors && data.errors.length > 0) {
                        data.errors.forEach(e => {
                            showToast(t[e.error_code] || e.message, 'error');
                        });
                        // Optional: Reset inputs on error to enforce clean state
                        state.cart = {1:0,2:0,3:0}; state.discount = 0;
                        resetResults(); refreshUI();
                    }
                }
            } catch (err) {
                showToast("Server Connection Failed.", "error");
            }
        };

        // Initial Boot
        refreshUI();
    </script>
</body>
</html>
